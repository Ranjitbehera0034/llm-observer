version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start --workspace=@llm-observer/proxy
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      # Expose secrets to node context via host env if necessary
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - redis
    volumes:
      - observer_db:/root/.llm-observer

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start --workspace=@llm-observer/worker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - proxy
    volumes:
      - observer_db:/root/.llm-observer

volumes:
  redis_data:
  observer_db:

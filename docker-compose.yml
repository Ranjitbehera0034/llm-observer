version: '3.8'

services:
  llm-observer:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev:all
    ports:
      - "4000:4000"
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - observer_db:/root/.llm-observer

volumes:
  observer_db:
